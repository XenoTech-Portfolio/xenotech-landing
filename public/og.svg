  </g>

  <!-- Testi -->
  <text x="90" y="250" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="800" fill="#f4f5fb">XenoTech<tspan fill="#e7c274">.</tspan></text>
  <text x="94" y="320" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="600" fill="#c3c7d8">Simone Mansella</text>
  <text x="94" y="392" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#e7c274">Sviluppo Web &#183; 3D &#183; Automazioni AI</text>
  <text x="94" y="560" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#9aa0b8">xenotech-landing.vercel.app</text>


<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="72%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#161428"/>
      <stop offset="100%" stop-color="#07070c"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7c274"/>
      <stop offset="100%" stop-color="#b8862b"/>
    </linearGradient>
    <linearGradient id="pyr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#e7c274"/>
      <stop offset="100%" stop-color="#38bdf8"/>
